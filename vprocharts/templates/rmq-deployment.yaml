apiVersion: apps/v1
kind: Deployment
metadata:
  name: vprormq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vprormq
  template:
    metadata:
      name: vprormq
      labels:
        app: vprormq
    spec:
      containers:
        - name: vprormq-container
          image: rabbitmq
          ports:
            - name: vprormq-port
              containerPort: 5672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: guest
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: vprofile-secret
                  key: rmq-pass
